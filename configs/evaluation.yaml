# Evaluation configuration
image_dir: data/processed/images
gt_instance_dir: data/processed/instance_maps
gt_type_dir: data/processed/type_maps
pred_instance_dir: outputs/predictions/instances
pred_type_dir: outputs/predictions/type_maps
classification_json_dir: outputs/predictions/classification/uni_results
figure_dir: outputs/figures
metrics_out: outputs/metrics.json

pairing_radius: 12
iou_threshold: 0.5
ignore_labels: [-1, 1]
class_names:
  0: Background
  1: Unidentifiable
  2: Neuron
  3: Oligo
  4: Debris
  5: Blood vessel
  6: Fimbria boundary
